<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Lumina</title>
  <style>
    @font-face {
      font-family: 'HollowKnight';
      src: url('/fonts/Supernatural_Knight.ttf') format('truetype');
      font-weight: normal;
      font-style: normal;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; overflow: hidden; background: #080e1e; }
    #game-container {
      width: 100%;
      height: 100%;
      background: #080e1e;
    }
  </style>
</head>
<body>
  <div id="game-container"></div>
  <script>
    // Preload custom font before Phaser starts so text renders correctly
    const font = new FontFace('HollowKnight', "url('/fonts/Supernatural_Knight.ttf')");
    font.load().then(function(loaded) {
      document.fonts.add(loaded);
    }).catch(function() {});
  </script>
  <script type="module" src="/src/main.ts"></script>
</body>
</html>
